[phases.setup]
nixPkgs = [
  "python311",
  "python311Packages.pip",
  "python311Packages.virtualenv",
  "nodejs"          # ← this was missing
]

[phases.install]
cmds = [
  "python3.11 -m venv /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip setuptools wheel",
  "/opt/venv/bin/pip install -r api/requirements.txt",
  "npm ci"          # ← installs all Node dependencies (including dev deps needed for build)
]

[phases.build]
cmds = ["npm run build"]   # ← explicitly runs your Next.js build

[start]
cmd = "/opt/venv/bin/uvicorn api.index:app --host 0.0.0.0 --port $PORT --workers 2"
